name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: repocrunch
            artifact: repocrunch-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-13
            binary: repocrunch
            artifact: repocrunch-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-14
            binary: repocrunch
            artifact: repocrunch-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: repocrunch.exe
            artifact: repocrunch-windows.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/repocrunch-linux-x86_64/repocrunch-linux-x86_64
            artifacts/repocrunch-macos-x86_64/repocrunch-macos-x86_64
            artifacts/repocrunch-macos-aarch64/repocrunch-macos-aarch64
            artifacts/repocrunch-windows.exe/repocrunch-windows.exe
